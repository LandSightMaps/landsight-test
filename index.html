L.marker([p.lat,p.lng],{icon}).addTo(map).on('click',()=>openLb(p));});
const allBounds=[];
DATA.parcels.forEach(p=>{try{const b=L.geoJSON(p.geojson).getBounds();allBounds.push(b.getSouthWest(),b.getNorthEast());}catch(e){}});
const allPts=[...bounds,...allBounds.map(b=>[b.lat,b.lng])];
if(allPts.length>1)map.fitBounds(L.latLngBounds(allPts),{padding:[50,50],maxZoom:19});else if(bounds.length===1)map.setView(bounds[0],17);
setTimeout(()=>map.invalidateSize(),100);
function deg2card(d){return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];}
const _gphotos=DATA.photos.filter(p=>p.hasGps);
let _lbIdx=0;
function openLb(p){
  _lbIdx=_gphotos.indexOf(p);
  _renderLb();
  document.getElementById('lightbox').classList.add('open');
}
function _renderLb(){
  const p=_gphotos[_lbIdx];
  if(!p)return;
  document.getElementById('lb-img').src=p.src;
  document.getElementById('lb-name').textContent=p.filename;
  let altTxt='Unknown';
  if(p.relAlt!=null)altTxt=parseFloat(p.relAlt).toFixed(1)+' m AGL';
  else if(p.altitude!=null)altTxt=Math.round(p.altitude)+' m ASL';
  document.getElementById('lb-meta').innerHTML=[
    {l:'GPS',v:p.hasGps?p.lat.toFixed(6)+', '+p.lng.toFixed(6):'No GPS',c:p.hasGps?'g':'w'},
    {l:'Heading',v:p.heading!=null?Math.round(p.heading)+'° '+deg2card(p.heading):'N/A'},
    {l:'Altitude',v:altTxt},
    {l:'Captured',v:p.datetime?new Date(p.datetime).toLocaleString():'Unknown'},
    {l:'Camera',v:[p.make,p.model].filter(Boolean).join(' ')||'Unknown'}
  ].map(m=>'<div class="lm"><div class="lml">'+m.l+'</div><div class="lmv '+(m.c||'')+'">'+m.v+'</div></div>').join('');
  const total=_gphotos.length;
  const prev=document.getElementById('lb-nav-prev');
  const next=document.getElementById('lb-nav-next');
  const ctr=document.getElementById('lb-counter');
  if(total<=1){prev.style.display='none';next.style.display='none';ctr.style.display='none';}
  else{prev.style.display='';next.style.display='';ctr.style.display='';prev.disabled=_lbIdx<=0;next.disabled=_lbIdx>=total-1;ctr.textContent=(_lbIdx+1)+' / '+total;}
}
function navLb(dir){
  const n=_lbIdx+dir;
  if(n<0||n>=_gphotos.length)return;
  _lbIdx=n;_renderLb();
}
function closeLb(){document.getElementById('lightbox').classList.remove('open');}
function openFsView(){
  const img=document.getElementById('lb-img');
  if(!img||!img.src||img.src===window.location.href)return;
  document.getElementById('fs-img').src=img.src;
  document.getElementById('fs-view').classList.add('open');
}
function closeFsView(){document.getElementById('fs-view').classList.remove('open');document.getElementById('fs-img').src='';}
document.getElementById('lb-img-tap').addEventListener('click',openFsView);
document.getElementById('lb-img-tap').addEventListener('touchend',function(e){e.preventDefault();openFsView();});
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))closeLb();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(document.getElementById('fs-view').classList.contains('open')){closeFsView();return;}closeLb();}
  if(e.key==='ArrowLeft')navLb(-1);
  if(e.key==='ArrowRight')navLb(1);
});
</script>
</body>
